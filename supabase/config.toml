# Declarative Supabase config — checked in so security-relevant settings are a property of the
# repo, not of whoever last ran the CLI.
project_id = "dose"

# The parse endpoint must always require a valid JWT (the app sends the anon key). Without this
# line, verification rests on a deploy-time CLI default — one `--no-verify-jwt` deploy (or a CLI
# default change) would silently open the endpoint to fully anonymous calls.
[functions.parse-medication]
verify_jwt = true

# Caregiver share is split into two functions so auth can differ by path:
#  - caregiver-share (create + revoke, WRITE): verify_jwt = true → the platform requires the app's anon
#    key + rate-limits, matching parse-medication. Browsers never write, so no CORS.
#  - caregiver-share-view (read, PUBLIC): verify_jwt = false → a caregiver's browser opens the link with
#    no auth header; access is gated by the unguessable token. This is the ONLY public verb.
[functions.caregiver-share]
verify_jwt = true

[functions.caregiver-share-view]
verify_jwt = false
